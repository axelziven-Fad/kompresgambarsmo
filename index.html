<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiPic - Gen Z Image Optimizer</title>
    <!-- Tailwind CSS via CDN untuk styling instan -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: white; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(to right, #c084fc, #f472b6, #60a5fa); -webkit-background-clip: text; color: transparent; }
        
        /* Animated Background Glows */
        .bg-glow-1 { position: absolute; top: -20%; left: -10%; width: 50vw; height: 50vw; background: rgba(147, 51, 234, 0.2); filter: blur(120px); border-radius: 50%; z-index: -1; }
        .bg-glow-2 { position: absolute; bottom: -20%; right: -10%; width: 50vw; height: 50vw; background: rgba(37, 99, 235, 0.2); filter: blur(120px); border-radius: 50%; z-index: -1; }
        
        .drop-zone.dragover { border-color: #a855f7; background: rgba(168, 85, 247, 0.1); transform: scale(1.02); }
        .hidden { display: none !important; }

        /* Custom Format Button Styles */
        .format-btn { padding: 6px 16px; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; transition: all 0.2s; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.05); color: #9ca3af; }
        .format-btn:hover { background: rgba(255,255,255,0.1); }
        .format-btn.active { background: #a855f7; color: white; border-color: #a855f7; box-shadow: 0 10px 15px -3px rgba(168,85,247,0.3); }
        .format-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body class="min-h-screen relative selection:bg-purple-500/30">
    <!-- Background Elements -->
    <div class="bg-glow-1"></div>
    <div class="bg-glow-2"></div>

    <div class="container mx-auto px-4 py-12 relative z-10 max-w-5xl min-h-screen flex flex-col items-center justify-center">
        
        <!-- Header -->
        <div class="text-center mb-12 transition-all duration-500" id="header">
            <div class="inline-flex items-center justify-center p-3 glass rounded-2xl mb-6 shadow-2xl shadow-purple-500/10">
                <svg class="w-8 h-8 text-purple-400 mr-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"></path></svg>
                <h1 class="text-3xl md:text-5xl font-bold gradient-text tracking-tight">OptiPic</h1>
            </div>
            <p class="text-gray-400 text-lg md:text-xl max-w-2xl mx-auto font-medium">
                Compress heavy pics or upscale tiny ones to the perfect ~700KB size. <br class="hidden md:block" /> Fast, private, and aesthetic af. ✨
            </p>
        </div>

        <!-- Upload Area -->
        <div id="upload-area" class="w-full max-w-2xl transition-all duration-500">
            <div id="drop-zone" class="relative group cursor-pointer overflow-hidden rounded-3xl border-2 border-dashed border-white/10 glass hover:border-purple-500/50 hover:bg-white/10 transition-all duration-300 ease-out flex flex-col items-center justify-center p-12 md:p-24 text-center shadow-2xl">
                <div class="bg-white/10 p-6 rounded-full mb-6 shadow-lg border border-white/5 group-hover:scale-110 transition-transform duration-300">
                    <svg class="w-12 h-12 text-purple-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path></svg>
                </div>
                <h3 class="text-2xl font-bold mb-3 text-white">Drop your pic here</h3>
                <p class="text-gray-400 font-medium">or click to browse files</p>
                <input type="file" id="file-input" class="hidden" accept="image/*">
            </div>
        </div>

        <!-- Result Area -->
        <div id="result-area" class="w-full max-w-5xl hidden opacity-0 transition-all duration-500 transform translate-y-4">
            <div class="grid md:grid-cols-2 gap-8">
                <!-- Original Card -->
                <div class="glass rounded-3xl p-6 flex flex-col">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="text-xl font-semibold text-gray-300 flex items-center">
                            <span class="w-2 h-2 rounded-full bg-gray-500 mr-3"></span>Original
                        </h3>
                        <span id="orig-size" class="px-3 py-1 bg-white/10 rounded-full text-sm font-mono text-gray-300"></span>
                    </div>
                    <div class="relative flex-1 rounded-2xl overflow-hidden bg-black/50 border border-white/5 min-h-[300px] flex items-center justify-center">
                        <img id="orig-img" class="max-w-full max-h-[400px] object-contain">
                    </div>
                </div>

                <!-- Optimized Card -->
                <div class="glass rounded-3xl p-6 border-purple-500/30 shadow-2xl shadow-purple-500/10 flex flex-col relative overflow-hidden">
                    <!-- Loading Overlay -->
                    <div id="processing-overlay" class="absolute inset-0 z-20 bg-black/60 backdrop-blur-sm flex flex-col items-center justify-center hidden">
                        <svg class="w-10 h-10 text-purple-400 mb-4 animate-spin" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                        <p class="text-purple-300 font-medium animate-pulse">Doing magic... ✨</p>
                    </div>

                    <div class="flex justify-between items-center mb-4 relative z-10">
                        <h3 class="text-xl font-semibold text-purple-300 flex items-center">
                            <span class="w-2 h-2 rounded-full bg-purple-500 mr-3 shadow-[0_0_10px_rgba(168,85,247,0.8)]"></span>Optimized
                        </h3>
                        <span id="opt-size" class="px-3 py-1 bg-purple-500/20 text-purple-300 rounded-full text-sm font-mono border border-purple-500/30 flex items-center"></span>
                    </div>

                    <!-- Format Selector -->
                    <div class="flex gap-2 mb-4 relative z-10" id="format-selector">
                        <button class="format-btn active" data-format="image/jpeg">JPEG</button>
                        <button class="format-btn" data-format="image/png">PNG</button>
                        <button class="format-btn" data-format="image/webp">WEBP</button>
                    </div>
                    
                    <div class="relative flex-1 rounded-2xl overflow-hidden bg-black/50 border border-white/5 min-h-[300px] flex items-center justify-center z-10">
                        <img id="opt-img" class="max-w-full max-h-[400px] object-contain">
                    </div>

                    <div class="mt-6 flex gap-4 relative z-10">
                        <a id="download-btn" class="flex-1 bg-gradient-to-r from-purple-600 to-blue-600 hover:from-purple-500 hover:to-blue-500 text-white font-bold py-4 px-6 rounded-2xl flex items-center justify-center transition-all shadow-lg shadow-purple-500/25 hover:shadow-purple-500/40 hover:-translate-y-1 cursor-pointer">
                            <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                            Download Pic
                        </a>
                        <button id="reset-btn" class="px-6 py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-2xl font-bold transition-all hover:-translate-y-1">
                            Start Over
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Core Logic
        const TARGET_SIZE = 700 * 1024; // Target 700KB
        const TOLERANCE = 50 * 1024; // Toleransi +/- 50KB
        let currentFile = null;
        let currentFormat = 'image/jpeg';
        let isProcessing = false;

        const formatBytes = (bytes) => {
            if (!+bytes) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(2))} ${sizes[i]}`;
        };

        // DOM Elements
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadArea = document.getElementById('upload-area');
        const resultArea = document.getElementById('result-area');
        const origImg = document.getElementById('orig-img');
        const optImg = document.getElementById('opt-img');
        const origSize = document.getElementById('orig-size');
        const optSize = document.getElementById('opt-size');
        const processingOverlay = document.getElementById('processing-overlay');
        const downloadBtn = document.getElementById('download-btn');
        const resetBtn = document.getElementById('reset-btn');
        const formatBtns = document.querySelectorAll('.format-btn');

        // Event Listeners
        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleInitialFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length) handleInitialFile(e.target.files[0]);
        });

        // Format Selection Logic
        formatBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                if (isProcessing || !currentFile) return;
                
                // Update UI Buttons
                formatBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                
                // Update Format & Reprocess
                currentFormat = btn.dataset.format;
                processImage(currentFile, currentFormat);
            });
        });

        resetBtn.addEventListener('click', () => {
            resultArea.classList.add('opacity-0', 'translate-y-4');
            setTimeout(() => {
                resultArea.classList.add('hidden');
                uploadArea.classList.remove('hidden');
                setTimeout(() => uploadArea.classList.remove('opacity-0', 'scale-95'), 50);
            }, 500);
            fileInput.value = '';
            currentFile = null;
        });

        function handleInitialFile(file) {
            if (!file.type.startsWith('image/')) return alert('Please upload an image! 📸');
            currentFile = file;
            
            // UI Transition
            uploadArea.classList.add('opacity-0', 'scale-95');
            setTimeout(() => {
                uploadArea.classList.add('hidden');
                resultArea.classList.remove('hidden');
                setTimeout(() => resultArea.classList.remove('opacity-0', 'translate-y-4'), 50);
            }, 500);

            const imgUrl = URL.createObjectURL(file);
            origImg.src = imgUrl;
            origSize.textContent = formatBytes(file.size);
            
            // Default to JPEG on first load
            currentFormat = 'image/jpeg';
            formatBtns.forEach(b => {
                if(b.dataset.format === 'image/jpeg') b.classList.add('active');
                else b.classList.remove('active');
            });

            processImage(file, currentFormat);
        }

        // Image Processing Engine
        async function processImage(file, format) {
            isProcessing = true;
            processingOverlay.classList.remove('hidden');
            formatBtns.forEach(b => b.disabled = true);
            
            try {
                const imgUrl = URL.createObjectURL(file);
                const img = await new Promise((res, rej) => {
                    const i = new Image();
                    i.onload = () => res(i);
                    i.onerror = rej;
                    i.src = imgUrl;
                });

                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                
                let minScale = 0.1;
                let maxScale = file.size < 500 * 1024 ? 4.0 : 2.0;
                let currentScale = 1.0;
                let currentQuality = 0.92;
                let bestBlob = null;
                let bestDiff = Infinity;

                // Binary Search Algorithm
                for (let i = 0; i < 15; i++) {
                    currentScale = (minScale + maxScale) / 2;
                    canvas.width = img.width * currentScale;
                    canvas.height = img.height * currentScale;
                    
                    // Fill white background for JPEG/WEBP if original had transparency
                    if (format !== 'image/png') {
                        ctx.fillStyle = '#FFFFFF';
                        ctx.fillRect(0, 0, canvas.width, canvas.height);
                    }
                    
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

                    // PNG doesn't use quality parameter in canvas.toBlob, it relies purely on scale
                    const blob = await new Promise(res => canvas.toBlob(res, format, currentQuality));
                    if (!blob) continue;

                    const diff = Math.abs(blob.size - TARGET_SIZE);
                    if (diff < bestDiff) {
                        bestDiff = diff;
                        bestBlob = blob;
                    }

                    if (blob.size > TARGET_SIZE) maxScale = currentScale;
                    else minScale = currentScale;

                    if (diff < TOLERANCE) break;
                }

                const finalBlob = bestBlob || file;
                const finalUrl = URL.createObjectURL(finalBlob);
                
                optImg.src = finalUrl;
                optSize.innerHTML = `${formatBytes(finalBlob.size)} ${Math.abs(finalBlob.size - TARGET_SIZE) < 100 * 1024 ? '✅' : ''}`;
                
                // Update Download Link
                const ext = format.split('/')[1];
                const originalName = file.name.split('.')[0];
                downloadBtn.href = finalUrl;
                downloadBtn.download = `optipic_${originalName}.${ext}`;
                
            } catch (err) {
                console.error(err);
                alert('Error processing image!');
            } finally {
                isProcessing = false;
                processingOverlay.classList.add('hidden');
                formatBtns.forEach(b => b.disabled = false);
            }
        }
    </script>
</body>
</html>
